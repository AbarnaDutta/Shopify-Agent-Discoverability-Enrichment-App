name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to EB
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Step 1: Create zip containing all files
      - name: Create deployment package
        run: |
          zip -r app.zip \
            Dockerfile \
            requirements.txt \
            app/ \
            frontend/
          
          # List files in zip to verify
          unzip -l app.zip

      # Step 2: Upload to S3
      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://elasticbeanstalk-ap-south-1-657229083717/app-${{ github.sha }}.zip

      # Step 3: Create application version
      - name: Create application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name shopify-agent \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket=elasticbeanstalk-ap-south-1-657229083717,S3Key=app-${{ github.sha }}.zip

      # Step 4: Deploy to environment
      - name: Update environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name shopify-agent \
            --version-label ${{ github.sha }}
