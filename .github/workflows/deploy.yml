name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy to EB
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY=shopify-agent
          IMAGE_TAG=${{ github.sha }}
          
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Create Dockerrun.aws.json
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": 1,
            "Image": {
              "Name": "${ECR_REGISTRY}/shopify-agent:${{ github.sha }}",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": "8000"
              }
            ]
          }
          EOF

      - name: Create source bundle
        run: |
          zip -r app.zip Dockerrun.aws.json Dockerfile requirements.txt app/

      - name: Upload to S3
        run: |
          aws s3 cp app.zip s3://elasticbeanstalk-ap-south-1-657229083717/app-${{ github.sha }}.zip

      - name: Create application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name shopify-agent \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket=elasticbeanstalk-ap-south-1-657229083717,S3Key=app-${{ github.sha }}.zip

      - name: Update environment
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name shopify-agent \
            --version-label ${{ github.sha }}
